<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1e2a"/>
      <stop offset="100%" stop-color="#0e1018"/>
    </linearGradient>
    <linearGradient id="kb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a4260"/>
      <stop offset="100%" stop-color="#252a3a"/>
    </linearGradient>
    <linearGradient id="key" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8ecf0"/>
      <stop offset="100%" stop-color="#c8ced6"/>
    </linearGradient>
    <linearGradient id="skull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f2f5"/>
      <stop offset="100%" stop-color="#c8ced6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2874c4"/>
      <stop offset="100%" stop-color="#1a5fa8"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="#2a3040" stroke-width="4"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#1a5fa8" stroke-width="2" opacity="0.3"/>

  <!-- Keyboard body -->
  <rect x="86" y="290" width="340" height="150" rx="12" fill="url(#kb)" stroke="#4a5270" stroke-width="3"/>

  <!-- Keyboard bevel highlight -->
  <rect x="86" y="290" width="340" height="4" rx="2" fill="#4a5270" opacity="0.5"/>

  <!-- Key row 1 (top) -->
  <rect x="102" y="306" width="28" height="24" rx="3" fill="url(#key)" stroke="#8a92a0" stroke-width="1.5"/>
  <rect x="136" y="306" width="28" height="24" rx="3" fill="url(#key)" stroke="#8a92a0" stroke-width="1.5"/>
  <rect x="170" y="306" width="28" height="24" rx="3" fill="url(#key)" stroke="#8a92a0" stroke-width="1.5"/>
  <rect x="204" y="306" width="28" height="24" rx="3" fill="url(#key)" stroke="#8a92a0" stroke-width="1.5"/>
  <rect x="238" y="306" width="28" height="24" rx="3" fill="url(#key)" stroke="#8a92a0" stroke-width="1.5"/>
  <rect x="272" y="306" width="28" height="24" rx="3" fill="url(#key)" stroke="#8a92a0" stroke-width="1.5"/>
  <rect x="306" y="306" width="28" height="24" rx="3" fill="url(#key)" stroke="#8a92a0" stroke-width="1.5"/>
  <rect x="340" y="306" width="28" height="24" rx="3" fill="url(#key)" stroke="#8a92a0" stroke-width="1.5"/>
  <rect x="374" y="306" width="28" height="24" rx="3" fill="url(#key)" stroke="#8a92a0" stroke-width="1.5"/>

  <!-- Key row 2 -->
  <rect x="110" y="336" width="28" height="24" rx="3" fill="url(#key)" stroke="#8a92a0" stroke-width="1.5"/>
  <rect x="144" y="336" width="28" height="24" rx="3" fill="url(#key)" stroke="#8a92a0" stroke-width="1.5"/>
  <rect x="178" y="336" width="28" height="24" rx="3" fill="url(#key)" stroke="#8a92a0" stroke-width="1.5"/>
  <rect x="212" y="336" width="28" height="24" rx="3" fill="url(#key)" stroke="#8a92a0" stroke-width="1.5"/>
  <rect x="246" y="336" width="28" height="24" rx="3" fill="url(#key)" stroke="#8a92a0" stroke-width="1.5"/>
  <rect x="280" y="336" width="28" height="24" rx="3" fill="url(#key)" stroke="#8a92a0" stroke-width="1.5"/>
  <rect x="314" y="336" width="28" height="24" rx="3" fill="url(#key)" stroke="#8a92a0" stroke-width="1.5"/>
  <rect x="348" y="336" width="28" height="24" rx="3" fill="url(#key)" stroke="#8a92a0" stroke-width="1.5"/>

  <!-- Key row 3 (spacebar row) -->
  <rect x="118" y="366" width="28" height="24" rx="3" fill="url(#key)" stroke="#8a92a0" stroke-width="1.5"/>
  <rect x="152" y="366" width="28" height="24" rx="3" fill="url(#key)" stroke="#8a92a0" stroke-width="1.5"/>
  <!-- Spacebar -->
  <rect x="186" y="366" width="130" height="24" rx="3" fill="url(#key)" stroke="#8a92a0" stroke-width="1.5"/>
  <rect x="322" y="366" width="28" height="24" rx="3" fill="url(#key)" stroke="#8a92a0" stroke-width="1.5"/>
  <rect x="356" y="366" width="28" height="24" rx="3" fill="url(#key)" stroke="#8a92a0" stroke-width="1.5"/>

  <!-- Highlighted keys (ocean blue — active cheats) -->
  <rect x="102" y="306" width="28" height="24" rx="3" fill="url(#glow)" stroke="#2874c4" stroke-width="1.5" opacity="0.9"/>
  <text x="116" y="323" font-family="monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">F1</text>
  <rect x="272" y="336" width="28" height="24" rx="3" fill="url(#glow)" stroke="#2874c4" stroke-width="1.5" opacity="0.9"/>

  <!-- Key labels on some keys -->
  <text x="150" y="323" font-family="monospace" font-size="11" font-weight="bold" fill="#3a4050" text-anchor="middle">F2</text>
  <text x="184" y="323" font-family="monospace" font-size="11" font-weight="bold" fill="#3a4050" text-anchor="middle">F3</text>

  <!-- SKULL -->
  <!-- Skull cranium -->
  <ellipse cx="256" cy="195" rx="75" ry="82" fill="url(#skull)" stroke="#8a92a0" stroke-width="2.5"/>

  <!-- Skull jaw -->
  <path d="M200 235 Q200 275 220 280 L225 270 L240 278 L256 270 L272 278 L287 270 L292 280 Q312 275 312 235" fill="url(#skull)" stroke="#8a92a0" stroke-width="2.5"/>

  <!-- Teeth -->
  <rect x="222" y="258" width="12" height="16" rx="2" fill="#1a1e2a" stroke="#8a92a0" stroke-width="1"/>
  <rect x="238" y="258" width="12" height="16" rx="2" fill="#1a1e2a" stroke="#8a92a0" stroke-width="1"/>
  <rect x="254" y="258" width="12" height="16" rx="2" fill="#1a1e2a" stroke="#8a92a0" stroke-width="1"/>
  <rect x="270" y="258" width="12" height="16" rx="2" fill="#1a1e2a" stroke="#8a92a0" stroke-width="1"/>
  <rect x="286" y="258" width="12" height="16" rx="2" fill="#1a1e2a" stroke="#8a92a0" stroke-width="1"/>

  <!-- Eye sockets -->
  <ellipse cx="228" cy="185" rx="22" ry="25" fill="#1a1e2a"/>
  <ellipse cx="284" cy="185" rx="22" ry="25" fill="#1a1e2a"/>

  <!-- Glowing eye pupils -->
  <ellipse cx="228" cy="188" rx="10" ry="12" fill="#1a5fa8" opacity="0.9"/>
  <ellipse cx="284" cy="188" rx="10" ry="12" fill="#1a5fa8" opacity="0.9"/>

  <!-- Eye glow -->
  <ellipse cx="228" cy="188" rx="6" ry="7" fill="#2874c4"/>
  <ellipse cx="284" cy="188" rx="6" ry="7" fill="#2874c4"/>

  <!-- Eye highlight -->
  <ellipse cx="224" cy="184" rx="3" ry="3" fill="#70b0e0" opacity="0.7"/>
  <ellipse cx="280" cy="184" rx="3" ry="3" fill="#70b0e0" opacity="0.7"/>

  <!-- Nose -->
  <path d="M250 210 L256 225 L262 210 Z" fill="#1a1e2a" stroke="#8a92a0" stroke-width="1"/>

  <!-- Crossbones behind keyboard -->
  <line x1="110" y1="410" x2="400" y2="300" stroke="#4a5270" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
  <line x1="400" y1="410" x2="110" y2="300" stroke="#4a5270" stroke-width="8" stroke-linecap="round" opacity="0.3"/>

  <!-- "CHEATBOARD" text -->
  <text x="256" y="470" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#70b0e0" text-anchor="middle" letter-spacing="4">CHEATBOARD</text>
</svg>
